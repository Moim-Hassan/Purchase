<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<div id="qr-reader" style="width:100%; max-width:400px; margin:0 auto;"></div>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
(function() {
    var lastResult = "";

    function send(v) {
        window.parent.postMessage({type: "streamlit:setComponentValue", value: v}, "*");
    }

    // Signal readiness immediately (do NOT wait for streamlit:render)
    window.parent.postMessage({type: "streamlit:componentReady", apiVersion: 1}, "*");

    // Start QR scanner (it will be hidden until streamlit:render makes iframe visible)
    var scanner = new Html5Qrcode("qr-reader");
    scanner.start(
        {facingMode: "environment"},
        {fps: 10, qrbox: 250},
        function onScanSuccess(decodedText) {
            if (decodedText !== lastResult) {
                lastResult = decodedText;
                send(decodedText);
            }
        },
        function onScanFailure() {}
    );
})();
</script>
</body>
</html>
