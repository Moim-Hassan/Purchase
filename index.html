<style>
.gps-box { padding:10px; background:#1a1a2e; border-radius:8px; color:#e0e0e0; font-family:monospace; }
.gps-box b { color:#00ff88; }
</style>
<div class="gps-box">
<b>📡 LIVE GPS TRACKING ACTIVE</b><br>
<span id="gps-status" style="color:#aaa;">Waiting for GPS data from browser...</span>
</div>
<script>
function sendLocation() {
    if (!navigator.geolocation) {
        document.getElementById("gps-status").innerText = "Geolocation not supported";
        return;
    }
    navigator.geolocation.watchPosition(
        function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            document.getElementById("gps-status").innerText = "GPS: " + lat.toFixed(6) + ", " + lon.toFixed(6);
            window.parent.postMessage(
                {type: "streamlit:setComponentValue", value: JSON.stringify({lat: lat, lon: lon})},
                "*"
            );
        },
        function(err) {
            document.getElementById("gps-status").innerText = "GPS error: " + err.message;
        },
        {enableHighAccuracy: true, maximumAge: 0, timeout: 10000}
    );
}
sendLocation();
</script>
